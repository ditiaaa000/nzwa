<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Nazwa Natania Tersayang</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: #d63384;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
            max-width: 80%;
            border: 2px solid #fff;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        #typing-text {
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 60px;
        }

        .heart-icon {
            font-size: 50px;
            color: #e91e63;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Animasi Hati Jatuh */
        .heart {
            position: absolute;
            top: -10px;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-icon">❤️</div>
        <h1>Untuk Nazwa Natania</h1>
        <div id="typing-text"></div>
        <p style="margin-top: 20px; font-weight: bold;">— Dari Aditya</p>
    </div>

    <script>
        // Pesan romantis
        const message = "Nazwa, sejak ada kamu, duniaku jadi jauh lebih berwarna. Kamu adalah alasan tersenyumku setiap hari. Aku sayang banget sama kamu... ❤️";
        const typingElement = document.getElementById('typing-text');
        let index = 0;

        // Efek Mengetik
        function typeWriter() {
            if (index < message.length) {
                typingElement.innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 100);
            }
        }

        // Animasi Hati Berjatuhan
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Jalankan fungsi
        window.onload = () => {
            typeWriter();
            setInterval(createHeart, 300);
        };
    </script>
</body>
</html>
