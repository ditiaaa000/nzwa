<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Nazwa Natania! 🎀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        :root {
            --pink-soft: #ffdde1;
            --pink-bold: #ff4d6d;
            --white: #ffffff;
            --text-color: #7d5a5a;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff5f5 0%, #ffdde1 100%);
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container Bubble */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 50px;
            border: 8px solid var(--pink-soft);
            text-align: center;
            max-width: 380px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.15);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Ikon Animasi */
        .header-icon {
            font-size: 80px;
            margin-bottom: 15px;
            display: inline-block;
            animation: floatAnim 3s infinite ease-in-out;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--pink-bold);
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 1px;
        }

        p {
            color: var(--text-color);
            font-weight: 700;
            line-height: 1.6;
            margin: 25px 0;
            font-size: 1.1rem;
        }

        /* Tombol Bubble */
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 18px 30px;
            border-radius: 40px;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        #btnNext {
            background: var(--pink-bold);
            color: white;
            box-shadow: 0 10px 0 #e63958;
        }

        #btnNext:hover {
            transform: scale(1.05);
            background: #ff5e7d;
        }

        #btnNext:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #e63958;
        }

        #btnGak {
            background: #f0f0f0;
            color: #bbb;
            font-size: 0.85rem;
            width: 50%;
            transition: 0.1s;
        }

        /* Dekorasi Melayang */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: flyUp 5s linear forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Efek Berkilau */
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <div class="header-icon" id="icon">🍓</div>
        <h1 id="title">Halo Nazwa! ✨</h1>
        <p id="text">Tebak deh, siapa orang paling lucu, pinter, sama keren yang aku kenal hari ini? 🤔🌻</p>
        
        <div class="btn-box">
            <button id="btnNext" onclick="nextAction()">Siapa tuh? 🧐</button>
            <button id="btnGak" onmouseover="kabur()">Enggak mau tau 😜</button>
        </div>
    </div>

    <script>
        let step = 0;
        const decorations = ['💖', '✨', '🎀', '🧸', '🍭', '🍓', '🐣', '🌈', '🍦', '🌷'];

        function nextAction() {
            step++;
            const title = document.getElementById('title');
            const text = document.getElementById('text');
            const btn = document.getElementById('btnNext');
            const icon = document.getElementById('icon');
            const btnGak = document.getElementById('btnGak');
            const card = document.getElementById('card');

            // Sound effect trick (browser must have interaction first)
            spawnDecor();

            if (step === 1) {
                icon.innerHTML = "👀";
                title.innerHTML = "Coba deh ngaca..";
                text.innerHTML = "Jawabannya ya <b>Nazwa Natania</b> lah! Masa tetangga sebelah? Hehe 😆✌️";
                btn.innerHTML = "Ih kamu bisa aja! 🙈";
                card.style.borderColor = "#ffc8dd";
            } 
            else if (step === 2) {
                icon.innerHTML = "🧸";
                title.innerHTML = "Hehe..";
                text.innerHTML = "Aku cuma mau bilang makasih ya kamu udah jadi orang paling asik. Semangat terus buat hari ini! 💪🎀";
                btn.innerHTML = "Makasih Aditya! 🍬";
                btnGak.style.display = "none";
                card.style.borderColor = "#bde0fe";
            }
            else if (step === 3) {
                icon.innerHTML = "💝";
                title.innerHTML = "Satu lagi..";
                text.innerHTML = "Aku sayang banget sama kamu, Nazwa! Pokoknya hari ini kamu harus bahagia terus ya! 🍦🌷✨";
                btn.innerHTML = "Sayang kamu juga! 😍";
                setInterval(spawnDecor, 300);
            }
            else {
                title.innerHTML = "Ciee! 😋";
                text.innerHTML = "Ada yang senyum-senyum sendiri nih baca ini! Kabarin aku ya kalau udah dibuka~ 💕";
                btn.style.display = "none";
                icon.innerHTML = "🐱✨";
            }
        }

        // Tombol kabur (lebih responsif)
        function kabur() {
            const btnGak = document.getElementById('btnGak');
            const x = Math.random() * (window.innerWidth - btnGak.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnGak.offsetHeight);
            btnGak.style.position = "fixed";
            btnGak.style.left = x + "px";
            btnGak.style.top = y + "px";
            btnGak.innerHTML = "Eits gak bisa! 😝";
        }

        // Fungsi dekorasi terbang
        function spawnDecor() {
            const count = step === 3 ? 15 : 6;
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const e = document.createElement('div');
                    e.className = 'decoration';
                    e.innerHTML = decorations[Math.floor(Math.random() * decorations.length)];
                    e.style.left = Math.random() * 100 + "vw";
                    e.style.top = "100vh";
                    e.style.fontSize = (Math.random() * 25 + 20) + "px";
                    document.body.appendChild(e);
                    setTimeout(() => e.remove(), 5000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
