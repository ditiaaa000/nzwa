<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hai Nazwa Natania! ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Varela+Round&display=swap');

        :root {
            --accent: #ff85a1;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            overflow: hidden;
        }

        /* Latar Belakang Animasi Bulatan Lucu */
        .bubble {
            position: absolute;
            background: rgba(255, 133, 161, 0.2);
            border-radius: 50%;
            filter: blur(20px);
            z-index: 1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Card Utama */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 4px solid white;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 133, 161, 0.2);
            width: 320px;
            position: relative;
            z-index: 10;
            animation: cardPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .avatar {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: swing 3s infinite ease-in-out;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        h1 {
            font-family: 'Varela Round', sans-serif;
            color: #ff4d6d;
            font-size: 1.6rem;
            margin: 0;
        }

        p {
            color: #880e4f;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 20px 0;
        }

        /* Tombol Modern */
        .btn-start {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-family: 'Varela Round', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            transition: 0.3s;
        }

        .btn-start:hover {
            transform: translateY(-5px) scale(1.05);
            background: #ff758f;
        }

        /* Styling Custom untuk SweetAlert */
        .my-popup {
            border-radius: 30px !important;
            font-family: 'Quicksand', sans-serif !important;
        }
    </style>
</head>
<body>

    <div class="bubble" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="bubble" style="width: 150px; height: 150px; bottom: 10%; right: 10%; animation-delay: -5s;"></div>

    <div class="main-card">
        <span class="avatar">🐱✨</span>
        <h1>Hai Nazwa!</h1>
        <p>Ada pesan kecil dari aku untuk kamu. Dibuka ya? 💌</p>
        <button class="btn-start" onclick="startStory()">Klik di Sini ✨</button>
    </div>

    <script>
        async function startStory() {
            // Popup 1
            await Swal.fire({
                title: 'Tebak Deh! 🐣',
                text: 'Kamu tahu gak siapa orang paling baik dan paling cantik yang aku kenal?',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3663/3663737.png',
                imageWidth: 100,
                confirmButtonText: 'Siapa tuh? 🤔',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'my-popup' },
                showClass: { popup: 'animate__animated animate__zoomIn' }
            });

            // Popup 2
            await Swal.fire({
                title: 'Jawabannya...',
                text: 'Ya Nazwa Natania lah! Orang yang lagi baca ini sekarang. Hehe 😋🍓',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3468/3468081.png',
                imageWidth: 100,
                confirmButtonText: 'Masa sih? 🙈',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'my-popup' }
            });

            // Popup 3 (Ada tombol 'Nggak' yang lari kalau mau diklik)
            const { value: confirm } = await Swal.fire({
                title: 'Satu hal lagi.. 🧸',
                text: 'Kamu tau gak kalau kehadiran kamu itu berharga banget buat aku?',
                showCancelButton: true,
                confirmButtonText: 'Iya tahu ❤️',
                cancelButtonText: 'Enggak 😝',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'my-popup' },
                // Logika tombol lari diimplementasikan secara sederhana di sini
            });

            if (confirm) {
                celebrate();
            }
        }

        function celebrate() {
            // Meledakkan Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ff85a1', '#fbb1bd']
            });

            // Final Popup
            Swal.fire({
                title: 'I Love You! 💝',
                html: 'Makasih ya sudah jadi bagian dari hari-hari aku, Nazwa.<br><br><b>Tetap bahagia terus ya sayang!</b> 🍦🌈✨',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/4359/4359963.png',
                imageWidth: 120,
                confirmButtonText: 'Sama-sama Aditya! 😍',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'my-popup' }
            });

            // Hujan emoji di background
            setInterval(createFloatingEmoji, 300);
        }

        function createFloatingEmoji() {
            const emojis = ['💖', '🌸', '✨', '🍭', '🍓', '🧸'];
            const e = document.createElement('div');
            e.style.position = 'fixed';
            e.style.bottom = '-50px';
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            e.style.zIndex = '999';
            e.style.pointerEvents = 'none';
            e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            document.body.appendChild(e);

            const anim = e.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: 4000 + Math.random() * 2000,
                easing: 'linear'
            });

            anim.onfinish = () => e.remove();
        }
    </script>
</body>
</html>
