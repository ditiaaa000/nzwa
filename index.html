<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khusus Untuk Nazwa Natania ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Pacifico&family=Quicksand:wght@400;700&display=swap');

        :root {
            --pink-utama: #ff85a1;
            --pink-tua: #ff4d6d;
            --bg-glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 50%, #f3e5f5 100%);
            overflow: hidden;
        }

        /* Latar Belakang Partikel Hati */
        .heart-bg {
            position: absolute;
            color: var(--pink-utama);
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Card Utama - Modern Glassmorphism */
        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 4px solid white;
            border-radius: 50px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(255, 133, 161, 0.3);
            max-width: 380px;
            width: 85%;
            z-index: 10;
            position: relative;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon-header {
            font-size: 90px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: var(--pink-tua);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .name-tag {
            font-family: 'Pacifico', cursive;
            color: #d81b60;
            font-size: 1.8rem;
            display: block;
            margin-bottom: 25px;
        }

        p {
            font-weight: 700;
            color: #5d4037;
            font-size: 1.15rem;
            line-height: 1.5;
            margin-bottom: 35px;
        }

        /* Tombol Mengkilap */
        .btn-love {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-love::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn-love:hover::before {
            left: 100%;
        }

        .btn-love:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.5);
        }

        /* Popup Custom Style */
        .custom-popup {
            border-radius: 40px !important;
            padding: 30px !important;
            font-family: 'Quicksand', sans-serif !important;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div class="container">
        <div class="icon-header">🐰✨</div>
        <h1>Hai Cantik,</h1>
        <span class="name-tag">Nazwa Natania</span>
        <p>Ada sesuatu yang mau aku kasih tahu.. <br> Kamu mau dengar gak? 🧸🎀</p>
        <button class="btn-love" onclick="startStory()">Mau Banget! 😍</button>
    </div>

    <script>
        // Bikin background hati otomatis
        function createBgHearts() {
            const container = document.getElementById('heart-container');
            const hearts = ['❤️', '💖', '✨', '🌸', '🍭', '🍓'];
            for (let i = 0; i < 20; i++) {
                let heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                container.appendChild(heart);
            }
        }
        createBgHearts();

        async function startStory() {
            // Step 1
            await Swal.fire({
                title: 'Kamu Tahu Gak? 🌻',
                text: 'Di mata aku, kamu itu kayak matahari. Bukan cuma bikin terang, tapi kehadirannya selalu bikin aku merasa hangat dan tenang.',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/2614/2614435.png',
                imageWidth: 100,
                confirmButtonText: 'Terus terus? 🙈',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'custom-popup' }
            });

            // Step 2
            await Swal.fire({
                title: 'Makasih Ya.. 🧸',
                text: 'Makasih udah jadi Nazwa yang paling sabar, paling lucu, dan selalu asik buat diajak apa aja. Beruntung banget aku punya kamu.',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3656/3656824.png',
                imageWidth: 100,
                confirmButtonText: 'Kamu bisa aja deh! 🥺',
                confirmButtonColor: '#ff4d6d',
                customClass: { popup: 'custom-popup' }
            });

            // Step 3 - Interaksi Lucu
            const { value: ans } = await Swal.fire({
                title: 'Satu Pertanyaan Penting! 🍦',
                text: 'Kamu janji ya bakal tetap bahagia terus sama aku?',
                showCancelButton: true,
                confirmButtonText: 'Janji Sayang! ❤️',
                cancelButtonText: 'Pikir dulu 😜',
                confirmButtonColor: '#ff4d6d',
                cancelButtonColor: '#bdc3c7',
                customClass: { popup: 'custom-popup' }
            });

            if (ans) {
                celebrate();
            } else {
                Swal.fire({
                    title: 'Gak ada pilihan lain! 😝',
                    text: 'Pokoknya kamu harus tetap sama aku terus. Gak terima penolakan! Wleee~',
                    icon: 'error',
                    confirmButtonText: 'Iya deh iya! 😍',
                    confirmButtonColor: '#ff4d6d',
                }).then(() => celebrate());
            }
        }

        function celebrate() {
            // Konfeti yang lebih mewah
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
              confetti(Object.assign({}, defaults, opts, {
                particleCount: Math.floor(count * particleRatio)
              }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });

            // Final Result
            Swal.fire({
                title: 'I Love You, Nazwa Natania! 💝',
                html: 'Hari ini, besok, dan selamanya, aku bakal tetap jadi orang yang paling sayang sama kamu. <br><br> <b>Love you to the moon and back! 🌙✨</b>',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/4359/4359963.png',
                imageWidth: 150,
                confirmButtonText: 'Love you too, Aditya! 😍',
                confirmButtonColor: '#ff4d6d',
                backdrop: `rgba(255,133,161,0.4) url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHIwdWswYm55Znd4M2x6eGZ5eW8xeGZ5eW8xeGZ5eW8xeGZ5ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/6p6Z8t6wO2s6c/giphy.gif") left top no-repeat`,
                customClass: { popup: 'custom-popup' }
            });
        }
    </script>
</body>
</html>
