<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazwa Natania</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap');

        :root {
            --primary: #ff4d6d;
            --bg: #0f0f1b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background Animasi Gradient */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
            z-index: -1;
            animation: pulseBg 8s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.4; }
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .status {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 30px;
            display: block;
        }

        #message {
            font-weight: 300;
            line-height: 1.6;
            font-size: 1rem;
            min-height: 80px;
            margin-bottom: 30px;
        }

        /* Button Styling */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            position: relative;
        }

        button {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }

        #btnYes {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        #btnNo {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            position: relative;
        }

        /* Lucu: Tombol 'No' lari */
        #btnNo.move {
            position: absolute;
        }

        /* Floating Hearts */
        .floating-heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: -1;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card" id="mainCard">
        <span class="status">Private Message</span>
        <h1>Hi, Nazwa.</h1>
        <p id="message">Lagi sibuk gak? Ada sesuatu yang mau gue bilang...</p>
        
        <div class="btn-group" id="btnContainer">
            <button id="btnYes" onclick="nextStep()">Apaan?</button>
            <button id="btnNo" onmouseover="moveButton()">Gak</button>
        </div>
    </div>

    <script>
        const messageText = document.getElementById('message');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        let step = 0;

        // Fungsi biar tombol No lari (Lucu)
        function moveButton() {
            if (step < 2) {
                const x = Math.random() * (window.innerWidth - 100);
                const y = Math.random() * (window.innerHeight - 50);
                btnNo.classList.add('move');
                btnNo.style.left = `${x}px`;
                btnNo.style.top = `${y}px`;
            }
        }

        function nextStep() {
            step++;
            if (step === 1) {
                messageText.style.opacity = 0;
                setTimeout(() => {
                    messageText.innerHTML = "Sebenernya gak penting-penting banget sih, cuma mau bilang kalau lo itu keren banget hari ini. ⚡";
                    btnYes.innerHTML = "Masa sih?";
                    messageText.style.opacity = 1;
                }, 300);
            } 
            else if (step === 2) {
                messageText.style.opacity = 0;
                setTimeout(() => {
                    messageText.innerHTML = "Iya serius. Stay awesome ya, Nazwa Natania. <br><br> <b>I love you!</b> ❤️";
                    btnYes.innerHTML = "Love you too!";
                    btnNo.style.display = "none";
                    messageText.style.opacity = 1;
                    triggerConfetti();
                }, 300);
            }
            else if (step === 3) {
                // Ending
                document.getElementById('mainCard').style.transform = "scale(0.9)";
                messageText.innerHTML = "Cieee senyum-senyum sendiri pas baca ini! <br> Kabarin ya kalau udah baca. 😉";
                btnYes.style.display = "none";
                setInterval(createHeart, 200);
            }
        }

        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffffff', '#ff8fa3']
            });
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
