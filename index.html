<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Nazwa ❤️</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Stars Background */
        .stars, .twinkling, .clouds {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .stars {
            background: #000 url('https://www.script-tutorials.com/demos/360/images/stars.png') repeat top center;
            z-index: 0;
            animation: move-stars 200s linear infinite;
        }

        .twinkling {
            background: transparent url('https://www.script-tutorials.com/demos/360/images/twinkling.png') repeat top center;
            z-index: 1;
            animation: move-twinkling 150s linear infinite;
        }

        @keyframes move-stars {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        @keyframes move-twinkling {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        /* Floating Hearts Background */
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .float-heart {
            position: absolute;
            color: rgba(255, 45, 85, 0.3);
            font-size: 20px;
            animation: float-heart 8s linear infinite;
            text-shadow: 0 0 20px #ff2d55;
        }

        @keyframes float-heart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100px) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            perspective: 1000px;
        }

        /* 3D Heart Container */
        .heart-3d {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 50px;
            transform-style: preserve-3d;
            animation: rotate-3d 10s infinite linear;
            cursor: pointer;
            filter: drop-shadow(0 0 50px #ff2d55);
        }

        @keyframes rotate-3d {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(-45deg); }
            25% { transform: rotateX(10deg) rotateY(180deg) rotateZ(-45deg); }
            50% { transform: rotateX(20deg) rotateY(360deg) rotateZ(-45deg); }
            75% { transform: rotateX(10deg) rotateY(540deg) rotateZ(-45deg); }
            100% { transform: rotateX(0deg) rotateY(720deg) rotateZ(-45deg); }
        }

        /* Modern Heart Design */
        .heart-modern {
            position: relative;
            width: 200px;
            height: 180px;
            background: linear-gradient(135deg, #ff2d55, #ff6b81, #ff4757);
            transform: rotate(-45deg);
            border-radius: 20px 20px 0 20px;
            box-shadow: 
                0 0 100px #ff2d55,
                0 0 200px #ff6b81,
                inset 0 0 50px rgba(255,255,255,0.5);
            animation: modern-pulse 1.5s ease-in-out infinite;
            overflow: hidden;
        }

        .heart-modern::before,
        .heart-modern::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: inherit;
            border-radius: 50%;
            filter: brightness(1.2);
        }

        .heart-modern::before {
            top: -100px;
            left: 0;
            box-shadow: 0 0 50px #ff2d55;
        }

        .heart-modern::after {
            top: 0;
            left: 100px;
            box-shadow: 0 0 50px #ff2d55;
        }

        /* Inner Glow Effect */
        .heart-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,45,85,0) 70%);
            border-radius: 50%;
            animation: glow-pulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes modern-pulse {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
        }

        /* Sparkle Effect */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: sparkle 3s linear infinite;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px white;
            animation: sparkle-move 2s ease-out infinite;
        }

        @keyframes sparkle-move {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(1) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        /* Text Styles */
        .main-text {
            margin-bottom: 30px;
        }

        .love-message {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: white;
            text-shadow: 
                0 0 10px #ff2d55,
                0 0 20px #ff2d55,
                0 0 40px #ff2d55,
                0 0 80px #ff2d55;
            animation: text-flicker 3s infinite;
            letter-spacing: 4px;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.5);
        }

        .sub-message {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 20px #ff6b81;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #ff2d55, 0 0 20px #ff2d55, 0 0 40px #ff2d55; }
            33% { opacity: 0.9; text-shadow: 0 0 15px #ff6b81, 0 0 30px #ff6b81, 0 0 60px #ff6b81; }
            66% { opacity: 1; text-shadow: 0 0 20px #ff4757, 0 0 40px #ff4757, 0 0 80px #ff4757; }
        }

        /* Love Counter */
        .love-counter {
            background: rgba(255, 45, 85, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 15px 30px;
            display: inline-block;
            margin-top: 30px;
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.3);
            animation: counter-glow 2s infinite;
        }

        .counter-number {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px #ff2d55;
            margin-right: 10px;
        }

        .counter-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
        }

        @keyframes counter-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 45, 85, 0.3); }
            50% { box-shadow: 0 0 70px rgba(255, 45, 85, 0.8); }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Music Player (hidden) */
        #musicPlayer {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .love-message { font-size: 2.5rem; }
            .sub-message { font-size: 1.2rem; }
            .heart-3d { width: 150px; height: 150px; }
            .heart-modern { width: 150px; height: 135px; }
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- Floating Hearts -->
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Main Content -->
    <div class="container">
        <!-- 3D Heart -->
        <div class="heart-3d" id="heart3D">
            <div class="heart-modern" id="loveHeart">
                <div class="heart-glow"></div>
                <div class="sparkles" id="sparkles"></div>
            </div>
        </div>

        <!-- Text Section -->
        <div class="main-text">
            <h1 class="love-message" id="mainMessage">NAZWA</h1>
            <h2 class="sub-message" id="subMessage">You Are My Everything</h2>
        </div>

        <!-- Love Counter -->
        <div class="love-counter" id="loveCounter">
            <span class="counter-number" id="counterNumber">0</span>
            <span class="counter-text">Times My Heart Beats For You</span>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="loveAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <script>
        $(document).ready(function() {
            let clickCount = 0;
            let particles = [];
            let audioPlaying = false;
            
            // Initialize Canvas
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            $(window).resize(resizeCanvas);

            // Particle Class
            class Particle {
                constructor(x, y, isExplosion = false) {
                    this.x = x || Math.random() * canvas.width;
                    this.y = y || Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 2) * 8;
                    this.size = Math.random() * 5 + 2;
                    this.color = `hsl(${Math.random() * 20 + 340}, 100%, 65%)`;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.02;
                    this.isExplosion = isExplosion;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1; // gravity
                    this.life -= this.decay;
                    
                    if (this.isExplosion) {
                        this.vx *= 0.98;
                        this.vy *= 0.98;
                    }
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.life;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // Create floating hearts background
            function createFloatingHeart() {
                const heart = $('<div class="float-heart">❤️</div>');
                const left = Math.random() * 100;
                const size = Math.random() * 20 + 10;
                const duration = Math.random() * 10 + 5;
                
                heart.css({
                    left: left + '%',
                    fontSize: size + 'px',
                    animation: `float-heart ${duration}s linear`,
                    opacity: Math.random() * 0.5 + 0.2
                });
                
                $('#floatingHearts').append(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }

            // Create floating hearts every 500ms
            setInterval(createFloatingHeart, 500);

            // Create sparkles around heart
            function createSparkles() {
                for (let i = 0; i < 8; i++) {
                    const sparkle = $('<div class="sparkle"></div>');
                    const angle = (i / 8) * Math.PI * 2;
                    const distance = 80;
                    
                    sparkle.css({
                        left: '50%',
                        top: '50%',
                        transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`,
                        animationDelay: Math.random() * 2 + 's'
                    });
                    
                    $('#sparkles').append(sparkle);
                }
            }
            createSparkles();

            // Animation sequence
            function startAnimation() {
                // Main message animation
                $('#mainMessage').animate({
                    opacity: 1,
                    fontSize: '4rem',
                    scale: 1
                }, 2000, 'swing');
                
                // Sub message animation
                $('#subMessage').delay(800).animate({
                    opacity: 1,
                    translateY: 0
                }, 1500, 'swing');
                
                // Create initial particles
                for (let i = 0; i < 50; i++) {
                    particles.push(new Particle());
                }
            }

            // Canvas animation loop
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles = particles.filter(p => p.life > 0);
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // Add random particles periodically
            setInterval(() => {
                if (particles.length < 200) {
                    for (let i = 0; i < 5; i++) {
                        particles.push(new Particle());
                    }
                }
            }, 500);

            // Start animation on load
            startAnimation();

            // Heart click interaction
            $('#loveHeart').click(function(e) {
                clickCount++;
                $('#counterNumber').text(clickCount).animate({
                    scale: 1.5
                }, 200).animate({
                    scale: 1
                }, 200);
                
                // Get heart position
                const rect = this.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Create explosion particles
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        particles.push(new Particle(
                            centerX + (Math.random() - 0.5) * 50,
                            centerY + (Math.random() - 0.5) * 50,
                            true
                        ));
                    }, i * 30);
                }
                
                // 3D rotation burst
                $('#heart3D').css('animation', 'none');
                setTimeout(() => {
                    $('#heart3D').css('animation', 'rotate-3d 10s infinite linear');
                }, 10);
                
                // Pulse animation on heart
                $(this).css('transform', 'rotate(-45deg) scale(1.3)');
                setTimeout(() => {
                    $(this).css('transform', 'rotate(-45deg) scale(1)');
                }, 200);
                
                // Change message colors
                $('.love-message, .sub-message').css({
                    color: '#ff6b81',
                    transition: 'color 0.3s ease'
                });
                
                setTimeout(() => {
                    $('.love-message, .sub-message').css({
                        color: 'white'
                    });
                }, 300);
                
                // Shake effect on counter
                $('#loveCounter').css('animation', 'none');
                setTimeout(() => {
                    $('#loveCounter').css('animation', 'counter-glow 2s infinite');
                }, 10);
                
                // Play audio on first click
                if (!audioPlaying) {
                    $('#loveAudio')[0].play().catch(e => console.log('Audio play failed:', e));
                    audioPlaying = true;
                }
            });

            // Double click effect
            $('#loveHeart').on('dblclick', function(e) {
                const rect = this.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Massive explosion
                for (let i = 0; i < 100; i++) {
                    setTimeout(() => {
                        particles.push(new Particle(
                            centerX + (Math.random() - 0.5) * 200,
                            centerY + (Math.random() - 0.5) * 200,
                            true
                        ));
                    }, i * 20);
                }
                
                // Change message
                const originalMsg = $('#mainMessage').text();
                $('#mainMessage').text('I LOVE YOU NAZWA! ❤️');
                
                setTimeout(() => {
                    $('#mainMessage').text(originalMsg);
                }, 2000);
                
                // Rainbow effect on counter
                let hue = 0;
                const interval = setInterval(() => {
                    $('#counterNumber').css('color', `hsl(${hue}, 100%, 65%)`);
                    hue += 5;
                    if (hue >= 360) {
                        clearInterval(interval);
                        $('#counterNumber').css('color', 'white');
                    }
                }, 50);
                
                // Add 10 to counter
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        clickCount++;
                        $('#counterNumber').text(clickCount);
                    }, i * 100);
                }
            });

            // Mouse move effect on heart
            $('#heart3D').mousemove(function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                $(this).css('transform', `rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(-45deg)`);
            });

            $('#heart3D').mouseleave(function() {
                $(this).css('transform', '');
            });

            // Create initial floating hearts
            for (let i = 0; i < 20; i++) {
                setTimeout(createFloatingHeart, i * 200);
            }
        });
    </script>
</body>
</html>
