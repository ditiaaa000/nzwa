<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Nazwa Natania! 🎀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        :root {
            --pink-soft: #ffdde1;
            --pink-bold: #ff4d6d;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container Gemas */
        .container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 5px solid var(--white);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            position: relative;
            z-index: 10;
        }

        /* Foto/Emoji Besar */
        .header-icon {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--pink-bold);
            font-size: 1.8rem;
            margin: 0;
        }

        p {
            color: #7d5a5a;
            font-weight: 500;
            line-height: 1.5;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        /* Tombol Lucu */
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        #btnNext {
            background: var(--pink-bold);
            color: white;
            box-shadow: 0 8px 0 #c9184a;
        }

        #btnNext:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c9184a;
        }

        #btnGak {
            background: #eee;
            color: #999;
            font-size: 0.8rem;
            width: 60%;
        }

        /* Animasi Emot Terbang */
        .emoji-fly {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: flyUp 4s linear forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="container" id="card">
        <div class="header-icon" id="icon">🌸</div>
        <h1 id="title">Halo Nazwa! ✨</h1>
        <p id="text">Tebak deh, siapa orang paling lucu, pinter, sama keren yang gue kenal hari ini? 🤔🌻</p>
        
        <div class="btn-box">
            <button id="btnNext" onclick="nextAction()">Siapa tuh? 🧐</button>
            <button id="btnGak" onmouseover="kabur()">Gak mau tau 😜</button>
        </div>
    </div>

    <script>
        let step = 0;
        const emojis = ['💖', '✨', '🎀', '🧸', '🍭', '🍓', '🐣', '🌈'];

        function nextAction() {
            step++;
            const title = document.getElementById('title');
            const text = document.getElementById('text');
            const btn = document.getElementById('btnNext');
            const icon = document.getElementById('icon');
            const btnGak = document.getElementById('btnGak');

            if (step === 1) {
                icon.innerHTML = "👀";
                title.innerHTML = "Coba Ngaca..";
                text.innerHTML = "Jawabannya ya <b>Nazwa Natania</b> lah! Masa tetangga sebelah? Wkwk 😆✌️";
                btn.innerHTML = "Ih apaan sih! 🙈";
                spawnEmojis();
            } 
            else if (step === 2) {
                icon.innerHTML = "🧸";
                title.innerHTML = "Hehe..";
                text.innerHTML = "Gue cuma mau bilang makasih ya udah jadi orang paling asik. Semangat terus buat hari ini! 💪🎀";
                btn.innerHTML = "Makasih Aditya! 🍬";
                btnGak.style.display = "none";
            }
            else if (step === 3) {
                icon.innerHTML = "💝";
                title.innerHTML = "Last One!";
                text.innerHTML = "I Love You, Nazwa! Don't forget to be happy today! 🍦🌷✨";
                btn.innerHTML = "Love you too! 😍";
                setInterval(spawnEmojis, 300);
            }
            else {
                alert("Cieee ada yang senyum-senyum! 😋💕");
            }
        }

        // Fungsi tombol lari (lucu)
        function kabur() {
            const btnGak = document.getElementById('btnGak');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btnGak.style.position = "fixed";
            btnGak.style.left = x + "px";
            btnGak.style.top = y + "px";
        }

        // Fungsi bikin emot terbang banyak
        function spawnEmojis() {
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    const e = document.createElement('div');
                    e.className = 'emoji-fly';
                    e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    e.style.left = Math.random() * 100 + "vw";
                    e.style.top = "100vh";
                    e.style.fontSize = (Math.random() * 20 + 20) + "px";
                    document.body.appendChild(e);
                    setTimeout(() => e.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
