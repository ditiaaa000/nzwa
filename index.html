<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Nazwa Natania ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Dancing+Script:wght@700&display=swap');

        :root {
            --primary: #ff477e;
            --secondary: #ff85a1;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(343, 100%, 76%, 0.15) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(343, 100%, 76%, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(343, 100%, 76%, 0.15) 0, transparent 50%);
        }

        /* Card Modern Floating */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            width: 340px;
            box-shadow: 0 25px 50px -12px rgba(255, 71, 126, 0.25);
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .heart-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-weight: 800;
            color: #4a0e0e;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .highlight {
            color: var(--primary);
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
        }

        p {
            color: #5d4037;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Button Aesthetic */
        .btn-fancy {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 126, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-fancy:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 15px 30px rgba(255, 71, 126, 0.4);
        }

        /* Floating Elements */
        .decor {
            position: absolute;
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="heart-icon">💖</div>
        <h1>Hai, <span class="highlight">Nazwa Natania</span></h1>
        <p>Aku punya sesuatu yang gak bisa diungkapkan lewat kata-kata biasa. Mau lihat? ✨</p>
        <button class="btn-fancy" onclick="startJourney()">Buka Pesannya 💌</button>
    </div>

    <script>
        async function startJourney() {
            // Popup 1: Hook
            await Swal.fire({
                title: 'Kamu Tahu Gak? 🍓',
                text: 'Di antara miliaran orang di bumi, ada satu orang yang kehadirannya selalu berhasil bikin duniaku terasa jauh lebih tenang.',
                confirmButtonText: 'Siapa itu? 👀',
                confirmButtonColor: '#ff477e',
                background: '#fffaff',
                customClass: { popup: 'rounded-popup' }
            });

            // Popup 2: Reveal
            await Swal.fire({
                title: 'Itu Kamu, Nazwa. ✨',
                text: 'Melihat senyum kamu itu kayak dapet booster kebahagiaan paling ampuh buat aku. Kamu itu "limitless" indahnya.',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3656/3656824.png',
                imageWidth: 100,
                confirmButtonText: 'Masa sih? 🙈',
                confirmButtonColor: '#ff477e',
                background: '#fffaff'
            });

            // Popup 3: Deep but Cute
            const { value: response } = await Swal.fire({
                title: 'Terima kasih ya.. 🧸',
                text: 'Makasih udah jadi alasanku buat semangat setiap hari. Kamu mau kan tetap jadi rumah buat ceritaku selamanya?',
                showCancelButton: true,
                confirmButtonText: 'Tentu dong! ❤️',
                cancelButtonText: 'Nggak mau 😜',
                confirmButtonColor: '#ff477e',
                cancelButtonColor: '#cfd8dc',
            });

            if (response) {
                celebrate();
            } else {
                Swal.fire('Eits!', 'Gak ada pilihan "Nggak" ya buat kamu! Wleee 😝', 'error');
                celebrate();
            }
        }

        function celebrate() {
            // Confetti Explosion
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Final Message
            Swal.fire({
                title: 'I Love You, Nazwa! 💝',
                html: 'Hari ini, besok, dan seterusnya.. Kamu tetap jadi favorit aku.<br><br><span style="font-family:Dancing Script; font-size:1.5rem; color:#ff477e;">— Dari Aditya, yang beruntung memilikimu.</span>',
                confirmButtonText: 'Love You Too, Aditya! 😍',
                confirmButtonColor: '#ff477e',
                backdrop: `rgba(255,133,161,0.4)`
            });

            setInterval(createHeart, 300);
        }

        function createHeart() {
            const symbols = ['💖', '✨', '🎀', '🌸', '🍭'];
            const e = document.createElement('div');
            e.className = 'decor';
            e.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.bottom = '-50px';
            e.style.fontSize = Math.random() * 30 + 10 + 'px';
            document.body.appendChild(e);

            const anim = e.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: 4000 + Math.random() * 2000,
                easing: 'ease-out'
            });

            anim.onfinish = () => e.remove();
        }
    </script>
</body>
</html>
